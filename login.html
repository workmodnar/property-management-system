<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | RoomBnB</title>
    <link rel="stylesheet" href="style.css">
    <script src="data.js" defer></script>
    <script src="app.js" defer></script>
</head>
<body>
    <div class="login-screen">
        <!-- 1. MAIN LOGIN CARD -->
        <div class="login-card" id="login-card-container">
            <a class="brand login-brand" href="index.html">
                <span class="brand-mark">R</span>
                <span data-site-name>RoomBnB</span>
            </a>
            <div>
                <h1>Welcome back</h1>
                <p>Choose your role to access your dashboard.</p>
            </div>
            
            <form data-login-form>
                <div style="display: flex; flex-direction: column; gap: 16px;">
                    <label>
                        Email
                        <input name="email" type="email" placeholder="e.g. customer@roombnb.com" required>
                    </label>
                    <label>
                        Password
                        <input name="password" type="password" placeholder="Enter your password" required>
                    </label>
                    <label>
                        Log in as
                        <select name="role" id="login-role-select" required>
                            <option value="customer">Customer (Guest)</option>
                            <option value="host">Property Owner (Host)</option>
                            <option value="admin">Platform Owner (Admin)</option>
                        </select>
                    </label>
                    <p class="login-error" data-login-error></p>
                    <button type="submit" class="button-primary">Sign In</button>
                </div>
            </form>

            <div class="auth-divider">Or</div>

            <button type="button" class="social-login-btn" id="google-login-btn">
                <svg viewBox="0 0 24 24" width="20" height="20" style="margin-right:8px;"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22c-.22-.67-.35-1.37-.35-2.09z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                Sign in with Google
            </button>

            <div style="text-align: center; margin-top: 10px;">
                <a class="small-link" href="register.html">Create an account</a>
            </div>
            <a class="small-link" href="index.html" style="margin-top: 10px; opacity:0.8;">← Back to homepage</a>
        </div>
    </div>
</body>
</html>
