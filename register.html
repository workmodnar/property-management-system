<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | RoomBnB</title>
    <link rel="stylesheet" href="style.css">
    <script src="data.js" defer></script>
    <script src="register.js" defer></script>
</head>
<body>
    <main class="login-screen login-page">
        <form class="login-card" data-register-form>
            <a class="brand login-brand" href="home.html">
                <span class="brand-mark">R</span>
                <span data-site-name>RoomBnB</span>
            </a>
            <div>
                <h1>Create an account</h1>
                <p>Join RoomBnB to start booking your perfect stay.</p>
            </div>
            <label class="register-field">
                Full name
                <input name="name" type="text" placeholder="Enter your full name" required>
            </label>
            <label class="register-field">
                Email
                <input name="email" type="email" placeholder="Enter your email" required>
            </label>
            <label class="register-field">
                Address
                <input name="address" type="text" placeholder="Enter your address" required>
            </label>
            <label class="register-field">
                Password
                <input name="password" type="password" placeholder="Create a password" required minlength="6">
            </label>
            <p class="login-error" data-register-error></p>
            <button type="submit" class="register-submit">Create account</button>
            <a class="small-link" href="login.html">Already have an account? Sign in</a>
            <a class="small-link" href="home.html">Back to homepage</a>
        </form>
    </main>
</body>
</html>
